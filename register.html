<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Qevira AI</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f4f4;display:flex;justify-content:center;align-items:center;height:100vh;margin:0}
.box{background:#fff;padding:24px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.15);width:340px}
h2{text-align:center}
input{width:100%;padding:10px;margin:8px 0;box-sizing:border-box}
button{width:100%;padding:10px;cursor:pointer}
a{text-decoration:none}
</style>
</head>
<body>
<div class="box">
<h2>Register</h2>

<input type="text" id="name" placeholder="Full Name">
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<input type="password" id="confirm" placeholder="Confirm Password">

<button onclick="register()">Register</button>

<br><br>
<a href="login.html">Already have an account? Login</a>
</div>

<script type="module">
import { auth } from "./firebase.js";
import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

window.register = async function () {
  const name=document.getElementById("name").value.trim();
  const email=document.getElementById("email").value.trim();
  const password=document.getElementById("password").value;
  const confirm=document.getElementById("confirm").value;

  if(!name || !email || !password || !confirm){
    alert("Please fill all fields");
    return;
  }

  if(password!==confirm){
    alert("Passwords do not match");
    return;
  }

  try{
    await createUserWithEmailAndPassword(auth,email,password);
    localStorage.setItem("userName",name);
    alert("Registration Successful");
    window.location.href="login.html";
  }catch(e){
    alert(e.message);
  }
};
</script>
</body>
</html>
