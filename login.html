<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Qevira AI</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f4f4;display:flex;justify-content:center;align-items:center;height:100vh;margin:0}
.box{background:#fff;padding:24px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.15);width:340px}
h2{text-align:center}
input{width:100%;padding:10px;margin:8px 0;box-sizing:border-box}
button{width:100%;padding:10px;cursor:pointer}
a{text-decoration:none}
</style>
</head>
<body>
<div class="box">
<h2>Login</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<br><br>
<a href="register.html">Create new account</a>
</div>

<script type="module">
import { auth } from "./firebase.js";
import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

window.login = async function () {
  const email=document.getElementById("email").value.trim();
  const password=document.getElementById("password").value;

  if(!email || !password){
    alert("Please fill all fields");
    return;
  }

  try{
    await signInWithEmailAndPassword(auth,email,password);
    alert("Login Successful");
    window.location.href="index.html";
  }catch(e){
    alert(e.message);
  }
};
</script>
</body>
</html>
