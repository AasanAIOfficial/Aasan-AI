<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Qevira AI</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.login-box{

background:#1e293b;
padding:35px;
border-radius:15px;
width:320px;
text-align:center;

}

h1{
color:#38bdf8;
}

input{

width:90%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
font-size:16px;

}

button{

width:100%;
padding:12px;
background:#38bdf8;
border:none;
border-radius:8px;
font-size:18px;
font-weight:bold;
cursor:pointer;

}

button:hover{

background:#0ea5e9;

}

a{

color:#38bdf8;
text-decoration:none;

}

</style>

</head>

<body>

<div class="login-box">

<h1>Login</h1>

<input type="email" placeholder="Email">

<input type="password" placeholder="Password">

<button>Login</button>

<br><br>

<a href="index.html">⬅ Back to Home</a>

</div>

</body>
</html>
